<!DOCTYPE HTML>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="../assets/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/panel.css" />

    <title>Bar Perita | Panel de administración</title>
</head>

<body>

    <main class="panel-page">

        <div class="panel-card">

            <div class="text-center panel-header">
                <img src="../assets/images/logo.png" alt="Logo Bar Perita" class="panel-logo">

                <h1 class="panel-title mt-3 mb-2">Panel de administración</h1>
                <p class="panel-subtitle mb-0">
                    Gestiona la información principal de Bar Perita.
                </p>
            </div>

            <div class="row g-4 mt-4">

                <div class="col-12 col-md-4">
                    <a href="./reservasAdmin.html" class="panel-option h-100">
                        <i class="fas fa-calendar-check"></i>
                        <h2>Reservas</h2>
                        <p>Consultar, modificar o eliminar reservas.</p>
                    </a>
                </div>

                <div class="col-12 col-md-4">
                    <a href="./localesAdmin.html" class="panel-option h-100">
                        <i class="fas fa-store"></i>
                        <h2>Locales</h2>
                        <p>Gestionar datos, horarios, imágenes y mapas.</p>
                    </a>
                </div>

                <div class="col-12 col-md-4">
                    <a href="./mensajesAdmin.html" class="panel-option h-100">
                        <i class="fas fa-envelope-open-text"></i>
                        <h2>Mensajes</h2>
                        <p>Consultar los mensajes enviados por clientes.</p>
                    </a>
                </div>

            </div>

            <div class="panel-actions mt-4">
                <a href="../inicio.html" class="btn btn-panel-outline">
                    VOLVER A LA WEB
                </a>

                <a href="./login.html" class="btn btn-panel-light">
                    CERRAR SESIÓN
                </a>
            </div>

        </div>

    </main>

</body>

</html>
