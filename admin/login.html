<!DOCTYPE HTML>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="../assets/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/login.css" />

    <title>Bar Perita | Acceso administración</title>
</head>

<body>

    <main class="login-page">

        <div class="login-card">

            <div class="text-center mb-4">
                <img src="../assets/images/logo.png" alt="Logo Bar Perita" class="login-logo">

                <h1 class="login-title mt-3 mb-1">Administración</h1>
                <p class="login-subtitle mb-0">
                    Acceso privado para la gestión de Bar Perita
                </p>
            </div>

            <form action="./panel.html" method="post">

                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" id="usuario" name="usuario"
                            placeholder="Nombre de usuario" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="clave" class="form-label">Contraseña</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="clave" name="clave"
                            placeholder="Contraseña" required>
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-login">
                        ENTRAR
                    </button>

                    <a href="../inicio.html" class="btn btn-volver">
                        VOLVER A LA WEB
                    </a>
                </div>

            </form>

        </div>

    </main>

</body>

</html>
